<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact Us</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>
<body>
<div id="header"></div>
<div class="sale-new">
    <h1>New Arrival</h1>

</div>
<div id="new-arrival" class="container">
    <div class="box">
        <div class="img-box">
            <img src="images/Polo.png" alt="Polo">
        </div>
        <h3>Polo Shirt</h3>
        <p class="price">
            <span class="price">Rs. 3499</span>
        </p>
    </div>
    <div class="box">
        <div class="img-box">
            <img src="images/Shirt.png" alt="Jeans">
        </div>
        <h3>Jeans</h3>
        <p class="price">
            <span class="price">Rs. 2999</span>
        </p>
    </div>
    <div class="box">
        <div class="img-box">
            <img src="images/Trouser.png" alt="Trouser">
        </div>
        <h3>Trouser</h3>
        <p class="price">
            <span class="price">Rs. 3999</span>
        </p>
    </div>
</div>
<div id="footer"></div>

<script src="script.js"></script>
</body>
</html>
