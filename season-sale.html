<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact Us</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>
<body>
<div id="header"></div>
<div class="sale-new">
    <h1>Season Sale</h1>

</div>
<div id="season" class="container">
    <div class="box">
        <div class="img-box">
            <img src="images/Kamez.png" alt="Kamez">
        </div>
        <h3>Shalwar Kameez</h3>
        <p class="price">
            <span class="old-price">Rs. 3999</span>
            <span class="new-price">Rs. 2999</span>
        </p>
    </div>

    <div class="box">
        <div class="img-box">
            <img src="images/Coat.png" alt="Coat">
        </div>
        <h3>Formal Coat</h3>
        <p class="price">
            <span class="old-price">Rs. 4999</span>
            <span class="new-price">Rs. 3999</span>
        </p>
    </div>

    <div class="box">
        <div class="img-box">
            <img src="images/Jeans.png" alt="Shirt">
        </div>
        <h3>Shirts</h3>
        <p class="price">
            <span class="old-price">Rs. 2999</span>
            <span class="new-price">Rs. 1999</span>
        </p>
    </div>
</div>
<div id="footer"></div>
<script src="script.js"></script>
</body>
</html>
