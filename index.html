<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>X Clothing</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
<div id="header"></div>
<div class="hero">
    <div class="slides">
        <div class="slide">
            <img src="images/Banner.png" alt="Banner">
        </div>
        <div class="slide">
            <img src="images/banner2.png" alt="Banner">
        </div>
        <div class="slide">
            <img src="images/banner3.png" alt="Banner">
        </div>
        <div class="slide">
            <img src="images/banner4.png" alt="Banner">
        </div>


        <h1>New Arrival</h1>
        <h2>Shop Now</h2>
    </div>
</div>
<div class="sale-new">
    <h1>Season Sale</h1>

</div>
<div id="season" class="container">
    <div class="box" onclick="openProduct('Shalwar Kameez','3999','2999','images/Kamez.png')">
        <div class="img-box">
            <img src="images/Kamez.png" alt="Kamez">
        </div>
        <h3>Shalwar Kameez</h3>
        <p class="price">
            <span class="old-price">Rs. 3999</span>
            <span class="new-price">Rs. 2999</span>
        </p>
    </div>
    <div class="box" onclick="openProduct('Coat','4999','3999','images/Coat.png')">
            <div class="img-box">
                <img src="images/Coat.png" alt="Coat">
            </div>
            <h3>Formal Coat</h3>
            <p class="price">
                <span class="old-price">Rs. 4999</span>
                <span class="new-price">Rs. 3999</span>
            </p>
        </div>
        <div class="box" onclick="openProduct('Shirt','2999','1999','images/Shirt.png')">
                <div class="img-box">
                    <img src="images/Jeans.png" alt="Shirt">
                </div>
                <h3>Shirts</h3>
                <p class="price">
                    <span class="old-price">Rs. 2999</span>
                    <span class="new-price">Rs. 1999</span>
                </p>
            </div>
        </div>
        <div class="view-more">
            <a href="season-sale.html">
                <button>View More</button>
            </a>
        </div>

        <div class="sale-new">
            <h1>New Arrival</h1>

        </div>
        <div id="new-arrival" class="container">
            <div class="box" onclick="openProduct('Polo Shirt','3499','','images/Polo.png')">
                <div class="img-box">
                    <img src="images/Polo.png" alt="Polo">
                </div>
                <h3>Polo Shirt</h3>
                <p class="price">
                    <span class="price">Rs. 3499</span>
                </p>
            </div>
            <div class="box">
                <div class="img-box">
                    <img src="images/Shirt.png" alt="Jeans">
                </div>
                <h3>Jeans</h3>
                <p class="price">
                    <span class="price">Rs. 2999</span>
                </p>
            </div>

            <div class="box">
                <div class="img-box">
                    <img src="images/Trouser.png" alt="Trouser">
                </div>
                <h3>Trouser</h3>
                <p class="price">
                    <span class="price">Rs. 3999</span>
                </p>
            </div>
            </a>
        </div>
        <div class="view-more">
            <a href="new-arrival.html">
                <button>View More</button>
            </a>
        </div>

        <div id="footer"></div>
        <script src="script.js"></script>
</body>
</html>
