<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact Us</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>
<body>
<div id="header"></div>

<div class="contactus">
    <h3>CONTACT US</h3>
    <p>We love to hear from you on our customer service, merchandise, website or any topics you want to share with us.
        Your comments and suggestions will be appreciated.
    </p>
    <h1>GET IN TOUCH</h1>
</div>
<div class="text">
    <h3>Send us an email</h3>
    <p>Ask us anything! We're here to help.</p>
</div>
<div class="form">
    <form id="contactForm">

        <p>Name <span class="star">*</span></p>
        <input type="text" id="name" name="name" required>

        <p>Phone Number <span class="star">*</span></p>
        <input type="tel" id="phone" name="phone" required>

        <p>Email Address <span class="star">*</span></p>
        <input type="email" id="email" name="email" required>

        <p>Message <span class="star">*</span></p>
        <textarea id="message" name="message" required></textarea>

        <button type="submit">Submit</button>

    </form>
</div>
<div id="footer"></div>

<script src="script.js"></script>
</body>
</html>
